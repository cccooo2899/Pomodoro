<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Clock</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: #FFF7F3;
    transition: background 0.6s ease;
  }

  body.break { background: #F0FBF7; }
  body.long-break { background: #FFF0F6; }

  /* ── Control bar ── */
  .control-bar {
    -webkit-app-region: drag;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    height: 42px;
    background: #FFF7F3;
    border-bottom: 2px solid #111111;
    flex-shrink: 0;
  }

  .control-bar-title {
    font-family: 'Bahnschrift', 'DIN Alternate', 'Arial Narrow', sans-serif;
    font-stretch: condensed;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #FF5A4F;
  }

  .control-bar-btns {
    -webkit-app-region: no-drag;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .control-bar-btns button {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    padding: 0;
    transition: opacity 0.2s;
  }

  .control-bar-btns button:hover { opacity: 0.7; }
  .btn-minimize { background: #FFD93D; }
  .btn-close    { background: #FF5A4F; }

  /* ── Main layout ── */
  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 24px;
  }

  .app {
    text-align: center;
    padding: 28px 40px 32px;
    background: #FFFFFF;
    border: 3px solid #111111;
    border-radius: 24px;
    box-shadow: 6px 6px 0 #111111;
    width: 100%;
  }

  /* ── Mode tabs ── */
  .mode-tabs {
    display: flex;
    gap: 5px;
    background: #F5EDE8;
    border: 2px solid #111111;
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 24px;
  }

  .mode-btn {
    flex: 1;
    padding: 7px 8px;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: rgba(17,17,17,0.4);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .mode-btn.active {
    background: #FF5A4F;
    color: #fff;
    box-shadow: 2px 2px 0 #111111;
  }

  body.break  .mode-btn.active { background: #8DE2C4; color: #111111; box-shadow: 2px 2px 0 #111111; }
  body.long-break .mode-btn.active { background: #FF8FB8; color: #111111; box-shadow: 2px 2px 0 #111111; }

  .mode-btn:hover:not(.active) { color: #111111; background: rgba(17,17,17,0.06); }

  /* ── Ring timer ── */
  .ring-container {
    position: relative;
    width: 220px;
    height: 220px;
    margin: 0 auto 24px;
  }

  @keyframes ring-pulse {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(255,90,79,0.45)); }
    50%       { filter: drop-shadow(0 0 20px rgba(255,90,79,0.85)); }
  }
  @keyframes ring-pulse-break {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(141,226,196,0.5)); }
    50%       { filter: drop-shadow(0 0 20px rgba(141,226,196,0.9)); }
  }
  @keyframes ring-pulse-long {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(255,143,184,0.5)); }
    50%       { filter: drop-shadow(0 0 20px rgba(255,143,184,0.9)); }
  }

  svg.ring {
    transform: rotate(-90deg);
    filter: drop-shadow(0 0 10px rgba(255,90,79,0.5));
    transition: filter 0.6s;
  }

  body.break     svg.ring { filter: drop-shadow(0 0 10px rgba(141,226,196,0.6)); }
  body.long-break svg.ring { filter: drop-shadow(0 0 10px rgba(255,143,184,0.6)); }

  body.running           svg.ring { animation: ring-pulse       2s ease-in-out infinite; }
  body.break.running     svg.ring { animation: ring-pulse-break 2s ease-in-out infinite; }
  body.long-break.running svg.ring { animation: ring-pulse-long 2s ease-in-out infinite; }

  .ring-bg {
    fill: rgba(255,90,79,0.07);
    stroke: rgba(17,17,17,0.1);
    stroke-width: 10;
    transition: fill 0.6s;
  }

  body.break     .ring-bg { fill: rgba(141,226,196,0.1); }
  body.long-break .ring-bg { fill: rgba(255,143,184,0.1); }

  .ring-progress {
    fill: none;
    stroke: #FF5A4F;
    stroke-width: 10;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.6s;
  }

  body.break     .ring-progress { stroke: #8DE2C4; }
  body.long-break .ring-progress { stroke: #FF8FB8; }

  .ring-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }

  @keyframes tomato-pulse {
    0%, 100% { transform: scale(1);    filter: drop-shadow(0 2px 8px rgba(255,90,79,0.4)); }
    50%       { transform: scale(1.12); filter: drop-shadow(0 4px 14px rgba(255,90,79,0.7)); }
  }

  .tomato-icon {
    font-size: 20px;
    line-height: 1;
    filter: drop-shadow(0 2px 6px rgba(255,90,79,0.45));
    transition: filter 0.3s;
  }

  body.running .tomato-icon { animation: tomato-pulse 2s ease-in-out infinite; }

  .time-display {
    font-family: 'Bahnschrift', 'DIN Alternate', 'Arial Narrow', sans-serif;
    font-stretch: condensed;
    font-size: 76px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #111111;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .session-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(17,17,17,0.38);
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 24px;
  }

  .btn-main {
    padding: 13px 44px;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 2.5px solid #111111;
    border-radius: 50px;
    cursor: pointer;
    background: #FF5A4F;
    color: #fff;
    transition: all 0.15s;
    box-shadow: 3px 3px 0 #111111;
  }

  body.break     .btn-main { background: #8DE2C4; color: #111111; }
  body.long-break .btn-main { background: #FF8FB8; color: #111111; }

  .btn-main:hover  { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 #111111; }
  .btn-main:active { transform: translate(1px,  1px);  box-shadow: 2px 2px 0 #111111; }

  .btn-icon {
    width: 42px; height: 42px;
    border: 2.5px solid #111111;
    border-radius: 50%;
    background: #FFF7F3;
    color: #111111;
    font-size: 15px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    box-shadow: 2px 2px 0 #111111;
  }

  .btn-icon:hover  { transform: translate(-1px, -1px); box-shadow: 3px 3px 0 #111111; }
  .btn-icon:active { transform: translate(1px,  1px);  box-shadow: 1px 1px 0 #111111; }

  /* ── Session dots ── */
  .session-dots {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 22px;
  }

  .session-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 2px solid #111111;
    background: transparent;
    transition: background 0.3s, box-shadow 0.3s;
  }

  .session-dot.done {
    background: #FF5A4F;
    box-shadow: 0 0 6px rgba(255,90,79,0.6);
  }

  /* ── Stats ── */
  .stats {
    display: flex;
    justify-content: center;
    gap: 48px;
    padding-top: 18px;
    border-top: 2px solid rgba(17,17,17,0.08);
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .stat-value {
    font-family: 'Bahnschrift', 'DIN Alternate', 'Arial Narrow', sans-serif;
    font-stretch: condensed;
    font-size: 30px;
    font-weight: 700;
    color: #111111;
    letter-spacing: 1px;
  }

  .stat-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(17,17,17,0.32);
  }
</style>
</head>
<body>

<div class="control-bar">
  <span class="control-bar-title">🍅 Pomodoro</span>
  <div class="control-bar-btns">
    <button class="btn-minimize" onclick="window.electronAPI?.minimize()" title="Minimize"></button>
    <button class="btn-close"    onclick="window.electronAPI?.close()"    title="Close"></button>
  </div>
</div>

<div class="main">
  <div class="app">

    <div class="mode-tabs">
      <button class="mode-btn active" onclick="setMode('work')">Focus</button>
      <button class="mode-btn" onclick="setMode('break')">Short Break</button>
      <button class="mode-btn" onclick="setMode('long')">Long Break</button>
    </div>

    <div class="ring-container">
      <svg class="ring" width="220" height="220" viewBox="0 0 220 220">
        <circle class="ring-bg" cx="110" cy="110" r="96"/>
        <circle class="ring-progress" id="ringProgress" cx="110" cy="110" r="96"/>
      </svg>
      <div class="ring-inner">
        <div class="tomato-icon">🍅</div>
        <div class="time-display" id="timeDisplay">25:00</div>
        <div class="session-label" id="sessionLabel">Focus Time</div>
      </div>
    </div>

    <div class="session-dots">
      <div class="session-dot" id="dot0"></div>
      <div class="session-dot" id="dot1"></div>
      <div class="session-dot" id="dot2"></div>
      <div class="session-dot" id="dot3"></div>
    </div>

    <div class="controls">
      <button class="btn-icon" onclick="reset()" title="Reset">↺</button>
      <button class="btn-main" id="startBtn" onclick="toggle()">Start</button>
      <button class="btn-icon" onclick="skip()" title="Skip">⏭</button>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="completedCount">0</span>
        <span class="stat-label">Sessions</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="totalMinutes">0</span>
        <span class="stat-label">Minutes</span>
      </div>
    </div>

  </div>
</div>

<script>
const MODES = {
  work:  { duration: 25 * 60, label: 'Focus Time',  body: '',           tab: 0 },
  break: { duration:  5 * 60, label: 'Short Break', body: 'break',      tab: 1 },
  long:  { duration: 15 * 60, label: 'Long Break',  body: 'long-break', tab: 2 },
};

let mode = 'work';
let remaining = MODES.work.duration;
let total = MODES.work.duration;
let running = false;
let interval = null;
let completed = 0;
let totalMins = 0;

const CIRCUMFERENCE = 2 * Math.PI * 96;
const ring = document.getElementById('ringProgress');
ring.style.strokeDasharray = CIRCUMFERENCE;

function updateRing() {
  const fraction = remaining / total;
  ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - fraction);
}

function updateDisplay() {
  const m = Math.floor(remaining / 60).toString().padStart(2, '0');
  const s = (remaining % 60).toString().padStart(2, '0');
  document.getElementById('timeDisplay').textContent = `${m}:${s}`;
  document.title = `${m}:${s} — ${MODES[mode].label}`;
  updateRing();
}

function updateDots() {
  const inCycle = completed % 4;
  for (let i = 0; i < 4; i++) {
    document.getElementById('dot' + i).classList.toggle('done', i < inCycle);
  }
}

function setMode(m) {
  clearInterval(interval);
  running = false;
  document.getElementById('startBtn').textContent = 'Start';

  mode = m;
  remaining = MODES[m].duration;
  total = MODES[m].duration;

  const bodyClasses = [MODES[m].body].filter(Boolean);
  document.body.className = bodyClasses.join(' ');
  updateDots();
  document.getElementById('sessionLabel').textContent = MODES[m].label;

  document.querySelectorAll('.mode-btn').forEach((b, i) => {
    b.classList.toggle('active', i === MODES[m].tab);
  });

  updateDisplay();
}

function toggle() {
  if (running) {
    clearInterval(interval);
    running = false;
    document.getElementById('startBtn').textContent = 'Resume';
    document.body.classList.remove('running');
  } else {
    running = true;
    document.getElementById('startBtn').textContent = 'Pause';
    document.body.classList.add('running');
    interval = setInterval(tick, 1000);
  }
}

function tick() {
  remaining--;
  updateDisplay();
  if (remaining <= 0) {
    clearInterval(interval);
    running = false;
    document.getElementById('startBtn').textContent = 'Start';
    onComplete();
  }
}

function onComplete() {
  beep();
  document.body.classList.remove('running');
  if (mode === 'work') {
    completed++;
    totalMins += 25;
    document.getElementById('completedCount').textContent = completed;
    document.getElementById('totalMinutes').textContent = totalMins;
    updateDots();
    setMode(completed % 4 === 0 ? 'long' : 'break');
  } else {
    setMode('work');
  }
}

function reset() {
  clearInterval(interval);
  running = false;
  remaining = total;
  document.getElementById('startBtn').textContent = 'Start';
  document.body.classList.remove('running');
  updateDisplay();
}

function skip() { onComplete(); }

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    gain.gain.setValueAtTime(0.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.8);
  } catch(e) {}
}

updateDisplay();
</script>
</body>
</html>
