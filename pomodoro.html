<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Clock</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a0a0a;
    transition: background 0.6s ease;
  }

  body.break { background: #0a1a12; }
  body.long-break { background: #0a0f1a; }

  .app {
    text-align: center;
    padding: 48px 56px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    backdrop-filter: blur(12px);
    box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    min-width: 380px;
  }

  .title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #ff6b6b;
    margin-bottom: 32px;
    transition: color 0.6s;
  }

  body.break .title { color: #51cf66; }
  body.long-break .title { color: #74c0fc; }

  .mode-tabs {
    display: flex;
    gap: 6px;
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 40px;
  }

  .mode-btn {
    flex: 1;
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: rgba(255,255,255,0.45);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .mode-btn.active {
    background: rgba(255,107,107,0.25);
    color: #ff6b6b;
  }

  body.break .mode-btn.active { background: rgba(81,207,102,0.25); color: #51cf66; }
  body.long-break .mode-btn.active { background: rgba(116,192,252,0.25); color: #74c0fc; }

  .mode-btn:hover:not(.active) { color: rgba(255,255,255,0.7); }

  /* Ring timer */
  .ring-container {
    position: relative;
    width: 220px;
    height: 220px;
    margin: 0 auto 36px;
  }

  svg.ring { transform: rotate(-90deg); }

  .ring-bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 8; }
  .ring-progress {
    fill: none;
    stroke: #ff6b6b;
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.6s;
  }

  body.break .ring-progress { stroke: #51cf66; }
  body.long-break .ring-progress { stroke: #74c0fc; }

  .ring-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .time-display {
    font-size: 56px;
    font-weight: 200;
    letter-spacing: -2px;
    color: #fff;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .session-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 36px;
  }

  .btn-main {
    padding: 14px 44px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    background: #ff6b6b;
    color: #fff;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(255,107,107,0.35);
  }

  body.break .btn-main { background: #51cf66; box-shadow: 0 4px 20px rgba(81,207,102,0.35); }
  body.long-break .btn-main { background: #74c0fc; box-shadow: 0 4px 20px rgba(116,192,252,0.35); }

  .btn-main:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-main:active { transform: translateY(0); }

  .btn-icon {
    width: 40px; height: 40px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 50%;
    background: transparent;
    color: rgba(255,255,255,0.45);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }

  .btn-icon:hover { border-color: rgba(255,255,255,0.3); color: #fff; }

  .stats {
    display: flex;
    justify-content: center;
    gap: 40px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .stat-value {
    font-size: 22px;
    font-weight: 300;
    color: #fff;
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }

  .tomato { font-size: 20px; margin-right: 6px; vertical-align: -2px; }

  /* Electron title bar */
  .titlebar {
    -webkit-app-region: drag;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
    padding: 0 0 16px 0;
  }

  .titlebar button {
    -webkit-app-region: no-drag;
    width: 12px; height: 12px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    padding: 0;
    transition: opacity 0.2s;
  }

  .titlebar button:hover { opacity: 0.7; }
  .btn-minimize { background: #f9c74f; }
  .btn-close    { background: #f94144; }
</style>
</head>
<body>
<div class="app">
  <div class="titlebar">
    <button class="btn-minimize" onclick="window.electronAPI?.minimize()" title="Minimize"></button>
    <button class="btn-close"    onclick="window.electronAPI?.close()"    title="Close"></button>
  </div>
  <div class="title"><span class="tomato">🍅</span>Pomodoro</div>

  <div class="mode-tabs">
    <button class="mode-btn active" data-mode="work"  onclick="setMode('work')">Focus</button>
    <button class="mode-btn"        data-mode="break" onclick="setMode('break')">Short Break</button>
    <button class="mode-btn"        data-mode="long"  onclick="setMode('long')">Long Break</button>
  </div>

  <div class="ring-container">
    <svg class="ring" width="220" height="220" viewBox="0 0 220 220">
      <circle class="ring-bg" cx="110" cy="110" r="96"/>
      <circle class="ring-progress" id="ringProgress" cx="110" cy="110" r="96"/>
    </svg>
    <div class="ring-inner">
      <div class="time-display" id="timeDisplay">25:00</div>
      <div class="session-label" id="sessionLabel">Focus Time</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-icon" onclick="reset()" title="Reset">↺</button>
    <button class="btn-main" id="startBtn" onclick="toggle()">Start</button>
    <button class="btn-icon" onclick="onComplete()" title="Skip">⏭</button>
  </div>

  <div class="stats">
    <div class="stat">
      <span class="stat-value" id="completedCount">0</span>
      <span class="stat-label">Sessions</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="totalMinutes">0</span>
      <span class="stat-label">Minutes</span>
    </div>
  </div>
</div>

<script>
const MODES = {
  work:  { duration: 25 * 60, label: 'Focus Time',  body: '' },
  break: { duration:  5 * 60, label: 'Short Break', body: 'break' },
  long:  { duration: 15 * 60, label: 'Long Break',  body: 'long-break' },
};

let mode = 'work';
let remaining = MODES.work.duration;
let running = false;
let interval = null;
let completed = 0;
let totalMins = 0;

const CIRCUMFERENCE = 2 * Math.PI * 96;
const ring         = document.getElementById('ringProgress');
const timeDisplay  = document.getElementById('timeDisplay');
const startBtn     = document.getElementById('startBtn');
const sessionLabel = document.getElementById('sessionLabel');
const completedEl  = document.getElementById('completedCount');
const totalMinsEl  = document.getElementById('totalMinutes');
const modeButtons  = [...document.querySelectorAll('.mode-btn')];

ring.style.strokeDasharray = CIRCUMFERENCE;

function updateRing() {
  ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - remaining / MODES[mode].duration);
}

function updateDisplay() {
  const m = Math.floor(remaining / 60).toString().padStart(2, '0');
  const s = (remaining % 60).toString().padStart(2, '0');
  timeDisplay.textContent = `${m}:${s}`;
  document.title = `${m}:${s} — ${MODES[mode].label}`;
  updateRing();
}

function stop() {
  clearInterval(interval);
  running = false;
  startBtn.textContent = 'Start';
}

function setMode(m) {
  stop();
  const cfg = MODES[m];
  mode = m;
  remaining = cfg.duration;
  document.body.className = cfg.body;
  sessionLabel.textContent = cfg.label;
  modeButtons.forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  updateDisplay();
}

function toggle() {
  if (running) {
    clearInterval(interval);
    running = false;
    startBtn.textContent = 'Resume';
  } else {
    running = true;
    startBtn.textContent = 'Pause';
    interval = setInterval(tick, 1000);
  }
}

function tick() {
  remaining--;
  updateDisplay();
  if (remaining <= 0) {
    stop();
    onComplete();
  }
}

function onComplete() {
  beep();
  if (mode === 'work') {
    completed++;
    totalMins += MODES.work.duration / 60;
    completedEl.textContent = completed;
    totalMinsEl.textContent = totalMins;
    setMode(completed % 4 === 0 ? 'long' : 'break');
  } else {
    setMode('work');
  }
}

function reset() {
  stop();
  remaining = MODES[mode].duration;
  updateDisplay();
}

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    gain.gain.setValueAtTime(0.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.8);
  } catch(e) {}
}

updateDisplay();
</script>
</body>
</html>
